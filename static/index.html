<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Council — Judges of Hades</title>
  <link rel="stylesheet" href="/static/style.css">
  <style>
    .council-layout { display: grid; grid-template-columns: 380px 1fr; gap: 1.5rem; align-items: start; }
    .submit-card { position: sticky; top: 72px; }
    .problem-select-row {
      display: flex; gap: 8px; align-items: flex-end; margin-bottom: 1rem;
    }
    .problem-select-row .select { flex: 1; }
    .version-row {
      display: flex; align-items: center; gap: 8px;
      padding: 0.6rem 0.75rem;
      background: var(--bg-3); border-radius: var(--radius);
      margin-bottom: 1rem; font-size: 0.8rem;
    }
    .version-dot {
      width: 6px; height: 6px; border-radius: 50%;
      background: var(--gold); flex-shrink: 0;
    }
    .result-area { min-height: 300px; }
    .polling-state {
      display: flex; flex-direction: column; align-items: center;
      gap: 1rem; padding: 3rem 2rem; text-align: center;
    }
    .polling-state .spinner { width: 32px; height: 32px; border-width: 3px; }
    .polling-label { font-family: var(--font-serif); font-size: 1.1rem; color: var(--text-2); }
    .polling-sub { font-size: 0.8rem; color: var(--text-3); font-family: var(--font-mono); }
    .agent-grid { display: flex; flex-direction: column; gap: 8px; }
    .feedback-row {
      display: flex; align-items: center; gap: 8px;
      padding: 1rem 1.25rem;
      background: var(--bg-2); border: 1px solid var(--border);
      border-radius: var(--radius-lg); margin-top: 1rem;
    }
    .feedback-label { font-size: 0.8rem; color: var(--text-2); margin-right: auto; }
    .star-btn {
      background: none; border: none;
      font-size: 1.1rem; cursor: pointer; opacity: 0.35;
      transition: opacity var(--transition), transform var(--transition);
      padding: 2px;
    }
    .star-btn:hover, .star-btn.active { opacity: 1; transform: scale(1.2); }
    .agent-trust-btn {
      background: var(--bg-3); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 3px 10px;
      font-size: 0.75rem; font-family: var(--font-mono);
      color: var(--text-2); cursor: pointer;
      transition: all var(--transition);
    }
    .agent-trust-btn:hover { border-color: var(--border-gold); color: var(--gold); }
    .agent-trust-btn.chosen { background: var(--gold-glow); border-color: var(--border-gold); color: var(--gold); }
    .run-meta {
      display: flex; flex-wrap: wrap; gap: 1rem;
      padding: 0.75rem 1rem;
      background: var(--bg-3); border-radius: var(--radius);
      margin-bottom: 1.25rem;
      font-size: 0.75rem; font-family: var(--font-mono); color: var(--text-3);
    }
    .run-meta span b { color: var(--text-2); }
    @media (max-width: 900px) {
      .council-layout { grid-template-columns: 1fr; }
      .submit-card { position: static; }
    }
  </style>
</head>
<body>
  <div class="nav" id="nav"></div>

  <div class="page">
    <div class="page-header">
      <div>
        <div class="page-title">The Council</div>
        <div class="page-subtitle">Submit a problem. The three judges deliberate. Hades decides.</div>
      </div>
    </div>

    <div class="council-layout">
      <!-- Left: submit panel -->
      <div class="submit-card card">
        <div class="card-header">
          <div class="card-title">New Deliberation</div>
        </div>

        <div id="submit-alert"></div>

        <div class="field">
          <label class="label">Problem</label>
          <select class="select" id="problem-select" onchange="onProblemChange()">
            <option value="">— create new —</option>
          </select>
        </div>

        <div id="new-problem-fields">
          <div class="field">
            <label class="label">Problem Title</label>
            <input class="input" id="problem-title" placeholder="Short descriptive title">
          </div>
          <div class="field">
            <label class="label">Visibility</label>
            <select class="select" id="problem-visibility">
              <option value="private">Private</option>
              <option value="org">Organisation</option>
              <option value="public">Public</option>
            </select>
          </div>
        </div>

        <div class="field">
          <label class="label">Describe the Problem</label>
          <textarea class="textarea" id="problem-text" rows="5"
            placeholder="Describe the decision or problem you need the council to deliberate on..."></textarea>
        </div>

        <button class="btn btn-primary btn-lg" style="width:100%" id="submit-btn" onclick="submitProblem()">
          Convene the Council
        </button>
      </div>

      <!-- Right: result panel -->
      <div class="result-area" id="result-area">
        <div class="empty">
          <div class="empty-icon">⚖</div>
          <div class="empty-title">Awaiting deliberation</div>
          <div class="empty-sub">Submit a problem to convene the council.</div>
        </div>
      </div>
    </div>
  </div>

  <script src="/static/app.js"></script>
  <script>
    if (!Auth.requireLogin()) throw '';
    renderNav('council');

    let problems = [];
    let currentRun = null;
    let pollTimer = null;
    let feedbackState = { rating: 0, chosen: null };

    async function init() {
      try {
        problems = await api.get('/problems?page_size=50');
        const sel = document.getElementById('problem-select');
        problems.forEach(p => {
          const o = document.createElement('option');
          o.value = p.id;
          o.textContent = p.title;
          sel.appendChild(o);
        });
      } catch {}
    }

    function onProblemChange() {
      const val = document.getElementById('problem-select').value;
      document.getElementById('new-problem-fields').style.display = val ? 'none' : 'block';
    }

    async function submitProblem() {
      clearAlert('submit-alert');
      const text = document.getElementById('problem-text').value.trim();
      if (!text) { showAlert('submit-alert', 'Please describe the problem.'); return; }

      setLoading('submit-btn', true, 'Convene the Council');
      try {
        let problemId = document.getElementById('problem-select').value;

        if (!problemId) {
          const title = document.getElementById('problem-title').value.trim() || text.slice(0, 60);
          const vis   = document.getElementById('problem-visibility').value;
          const prob  = await api.post('/problems', { title, visibility: vis });
          problemId   = prob.id;
        }

        const run = await api.post(`/problems/${problemId}/runs`, { problem_text: text });
        currentRun = run;
        showPolling(run);
        pollForResult(run.id);
      } catch (err) {
        showAlert('submit-alert', err.detail || 'Failed to submit.');
        setLoading('submit-btn', false, 'Convene the Council');
      }
    }

    function showPolling(run) {
      document.getElementById('result-area').innerHTML = `
        <div class="card polling-state">
          <div class="spinner"></div>
          <div class="polling-label">The council is deliberating…</div>
          <div class="polling-sub mono">RUN · v${run.version} · ${run.id.slice(0,8).toUpperCase()}</div>
        </div>
      `;
      setLoading('submit-btn', false, 'Convene the Council');
    }

    function pollForResult(runId) {
      if (pollTimer) clearInterval(pollTimer);
      pollTimer = setInterval(async () => {
        try {
          const run = await api.get(`/runs/${runId}`);
          if (run.status === 'done') {
            clearInterval(pollTimer);
            await showResult(run);
          } else if (run.status === 'failed') {
            clearInterval(pollTimer);
            document.getElementById('result-area').innerHTML = `
              <div class="alert alert-error">The council failed to reach a verdict. Please try again.</div>`;
          }
        } catch {}
      }, 2500);
    }

    async function showResult(run) {
      let agentOutputs = [];
      try { agentOutputs = await api.get(`/runs/${run.id}/agents`); } catch {}

      const agentMap = {};
      agentOutputs.forEach(a => agentMap[a.agent_name] = a);

      const agents = [
        { key: 'sales',      label: 'Sales Strategist',      icon: 'S', cls: 'icon-sales'   },
        { key: 'operations', label: 'Operations Strategist',  icon: 'O', cls: 'icon-ops'     },
        { key: 'finance',    label: 'Finance Strategist',     icon: 'F', cls: 'icon-finance' },
      ];

      const accordions = agents.map(a => {
        const out = agentMap[a.key];
        if (!out) return '';
        return `
          <div class="accordion" onclick="accordion(this)">
            <button class="accordion-trigger">
              <span class="accordion-label">
                <span class="accordion-agent-icon ${a.cls}">${a.icon}</span>
                ${a.label}
              </span>
              <span class="accordion-chevron">▾</span>
            </button>
            <div class="accordion-body">
              <div class="accordion-content">
                ${out.raw_output}
                <div class="accordion-meta">
                  <span>⏱ ${out.latency_ms}ms</span>
                  ${out.tokens_used ? `<span>◈ ${out.tokens_used} tokens</span>` : ''}
                </div>
              </div>
            </div>
          </div>`;
      }).join('');

      document.getElementById('result-area').innerHTML = `
        <div class="run-meta">
          <span><b>Run</b> v${run.version}</span>
          <span><b>ID</b> ${run.id.slice(0,8).toUpperCase()}</span>
          <span><b>Completed</b> ${fmtDate(run.completed_at)}</span>
        </div>

        <div class="decision-card">
          <div class="decision-card-header">
            <span class="decision-crown">𓂀</span>
            <div>
              <div class="decision-label">Final Verdict — Hades</div>
            </div>
          </div>
          <div class="decision-body">${run.final_decision}</div>
        </div>

        <div class="agent-grid">${accordions}</div>

        <div class="feedback-row" id="feedback-row">
          <span class="feedback-label">Rate this verdict:</span>
          ${[1,2,3,4,5].map(n => `
            <button class="star-btn" onclick="setRating(${n})" data-star="${n}">★</button>`).join('')}
          <span style="width:1px;background:var(--border);height:20px;margin:0 4px"></span>
          <span style="font-size:0.75rem;color:var(--text-3);margin-right:4px">Most helpful:</span>
          ${agents.map(a => `
            <button class="agent-trust-btn" onclick="setChosen('${a.key}', this)">${a.key}</button>`).join('')}
          <button class="btn btn-primary btn-sm" onclick="submitFeedback('${run.id}')">Save</button>
        </div>
      `;

      feedbackState = { rating: 0, chosen: null };
    }

    function setRating(n) {
      feedbackState.rating = n;
      document.querySelectorAll('.star-btn').forEach(b => {
        b.classList.toggle('active', parseInt(b.dataset.star) <= n);
      });
    }

    function setChosen(agent, btn) {
      feedbackState.chosen = agent;
      document.querySelectorAll('.agent-trust-btn').forEach(b => b.classList.remove('chosen'));
      btn.classList.add('chosen');
    }

    async function submitFeedback(runId) {
      try {
        await api.post(`/runs/${runId}/feedback`, {
          rating:       feedbackState.rating || null,
          chosen_agent: feedbackState.chosen,
        });
        const row = document.getElementById('feedback-row');
        if (row) row.innerHTML = `<span class="text-gold" style="font-size:0.85rem">✓ Feedback recorded</span>`;
      } catch (err) {
        if (err.status === 409) {
          const row = document.getElementById('feedback-row');
          if (row) row.innerHTML = `<span class="text-muted" style="font-size:0.85rem">Feedback already submitted for this run.</span>`;
        }
      }
    }

    init();
  </script>
</body>
</html>
